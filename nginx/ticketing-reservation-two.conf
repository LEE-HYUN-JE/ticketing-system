upstream queue_api {
    least_conn;
    server queue-was-1:8080 max_fails=3 fail_timeout=5s;
    server queue-was-2:8080 max_fails=3 fail_timeout=5s;
    server queue-was-3:8080 max_fails=3 fail_timeout=5s;
    keepalive 2048;
}

upstream reservation_api {
    least_conn;
    server reservation-was-1:8080 max_fails=3 fail_timeout=5s;
    server reservation-was-2:8080 max_fails=3 fail_timeout=5s;
    keepalive 1024;
}

server {
    listen 80 backlog=65535 reuseport;
    server_name _;

    access_log off;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 1s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
    proxy_next_upstream off;

    location ~ ^/api/events/[^/]+/reservations {
        proxy_pass http://reservation_api;
    }

    location ~ ^/api/events/[^/]+/queue {
        proxy_pass http://queue_api;
    }

    location /actuator/health {
        proxy_pass http://queue_api;
    }

    location / {
        proxy_pass http://queue_api;
    }
}
