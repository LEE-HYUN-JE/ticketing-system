upstream queue_api {
    least_conn;
    server queue-was-1:8080 max_fails=3 fail_timeout=5s;
    server queue-was-2:8080 max_fails=3 fail_timeout=5s;
    server queue-was-3:8080 max_fails=3 fail_timeout=5s;
    keepalive 128;
}

upstream reservation_api {
    least_conn;
    server reservation-was-1:8080 max_fails=3 fail_timeout=5s;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location ~ ^/api/events/[^/]+/reservations {
        proxy_pass http://reservation_api;
    }

    location ~ ^/api/events/[^/]+/queue {
        proxy_pass http://queue_api;
    }

    location /actuator/health {
        proxy_pass http://queue_api;
    }

    location / {
        proxy_pass http://queue_api;
    }
}
