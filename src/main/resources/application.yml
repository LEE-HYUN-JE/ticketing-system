server:
  port: 8080
  tomcat:
    threads:
      max: 400
      min-spare: 50
    max-connections: 20000
    accept-count: 10000
    connection-timeout: 5s

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ticketing
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    defer-datasource-initialization: false
  sql:
    init:
      mode: always
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info

queue:
  admission-rate-per-second: 300
  poll-after-seconds: 5
  active-ttl-seconds: 60
  token-ttl-seconds: 3600
  scheduler-enabled: true

reservation:
  seat-capacity: 2000
  seat-id-prefix: seat-
  idempotency-ttl-seconds: 600
  idempotency-key-max-length: 120
  persistence:
    stream-key: reservation-events
    consumer-group: persistence-workers
    consumer-name: worker-1
    batch-size: 10
    pending-idle-ms: 30000
    worker-enabled: true
